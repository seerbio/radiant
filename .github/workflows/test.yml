name: Test and Lint
on: [pull_request]
jobs:
  test:
    name: Test Container
    steps:
      - uses: actions/checkout@v2
      - name: container-test
        run: ./test-container.sh

  lint-container:
    name: Lint Container
    steps:
      - uses: actions/checkout@v2
      - name: hadolint
        uses: reviewdog/action-hadolint@v1
        with:
          reporter: github-pr-check # Default

  lint-actions:
    name: Lint Actions Config
    steps:
      - uses: actions/checkout@v2
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check # Default
