name: Test and Lint
on: [pull_request]
jobs:
  test-x86_64:
    name: Test Container (x86_64)
    runs-on: ubuntu-20.04 # x86_64
    steps:
      - uses: actions/checkout@v2
      - name: container-test
        run: ./test-container.sh

  test-aarch64:
    name: Test Container (aarch64)
    runs-on: [self-hosted, aarch64]
    steps:
      - uses: actions/checkout@v2
      - name: container-test
        run: ./test-container.sh

  lint-container:
    name: Lint Container
    runs-on: ubuntu-20.04 # x86_64
    steps:
      - uses: actions/checkout@v2
      - name: hadolint
        uses: reviewdog/action-hadolint@v1
        with:
          reporter: github-pr-check # Default

  lint-actions:
    name: Lint Actions Config
    runs-on: ubuntu-20.04 # x86_64
    steps:
      - uses: actions/checkout@v2
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check # Default
