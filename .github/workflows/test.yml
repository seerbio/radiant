name: Test and Lint
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test-x86_64:
    name: Test Container (x86_64)
    #runs-on: [self-hosted, aws-master, X64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Expose GitHub runtime for Buildx cache
        run: |
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "${GITHUB_ENV}"
          echo "ACTIONS_RESULTS_URL=${ACTIONS_RESULTS_URL}" >> "${GITHUB_ENV}"
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "${GITHUB_ENV}"
          echo "ACTIONS_CACHE_SERVICE_V2=${ACTIONS_CACHE_SERVICE_V2:-}" >> "${GITHUB_ENV}"
      - name: container-test
        env:
          USE_BUILDX: 1
          CACHE_FROM: type=gha,scope=radiant-dia-x86_64
          CACHE_TO: ${{ github.event_name == 'push' && 'type=gha,scope=radiant-dia-x86_64,mode=max' || '' }}
        run: ./test_container.sh

  test-aarch64:
    name: Test Container (aarch64)
    #runs-on: [self-hosted, aws-master, ARM64]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Expose GitHub runtime for Buildx cache
        run: |
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "${GITHUB_ENV}"
          echo "ACTIONS_RESULTS_URL=${ACTIONS_RESULTS_URL}" >> "${GITHUB_ENV}"
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "${GITHUB_ENV}"
          echo "ACTIONS_CACHE_SERVICE_V2=${ACTIONS_CACHE_SERVICE_V2:-}" >> "${GITHUB_ENV}"
      - name: container-test
        env:
          USE_BUILDX: 1
          CACHE_FROM: type=gha,scope=radiant-dia-aarch64
          CACHE_TO: ${{ github.event_name == 'push' && 'type=gha,scope=radiant-dia-aarch64,mode=max' || '' }}
        run: ./test_container.sh

  lint-container:
    name: Lint Container
    runs-on: ubuntu-24.04 # x86_64
    steps:
      - uses: actions/checkout@v6
      - name: hadolint
        uses: reviewdog/action-hadolint@v1
        with:
          reporter: github-pr-check # Default

  lint-actions:
    name: Lint Actions Config
    runs-on: ubuntu-24.04 # x86_64
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check # Default

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-24.04 # x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-shellcheck@v1
        with:
          reporter: github-pr-check # Default
