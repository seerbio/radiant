name: Test and Lint
on: [pull_request]
jobs:
  test-x86_64:
    name: Test Container (x86_64)
    runs-on: [self-hosted, aws-master, X64]
    steps:
      - uses: actions/checkout@v6
      - name: container-test
        run: ./test_container.sh

  test-aarch64:
    name: Test Container (aarch64)
    runs-on: [self-hosted, aws-master, ARM64]
    steps:
      - uses: actions/checkout@v6
      - name: container-test
        run: ./test_container.sh

  lint-container:
    name: Lint Container
    runs-on: ubuntu-24.04 # x86_64
    steps:
      - uses: actions/checkout@v6
      - name: hadolint
        uses: reviewdog/action-hadolint@v1
        with:
          reporter: github-pr-check # Default

  lint-actions:
    name: Lint Actions Config
    runs-on: ubuntu-24.04 # x86_64
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check # Default

  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-24.04 # x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-shellcheck@v1
        with:
          reporter: github-pr-check # Default
