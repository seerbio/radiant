name: Tag Container

on:
  release:
    types: [created]

env:
  CONTAINER: seerbio/radiant-dia
  DOCKERHUB_REGISTRY: docker.io
  TAG_MATCH_CONTAINER: seer/radiant-dia

jobs:
  publish_x86_docker:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish x86 container image to Docker Hub
        env:
          REPOSITORY: ${{ env.DOCKERHUB_REGISTRY }}
          TAG_SUFFIX: -x86_64
        run: ./deploy_docker_image.sh "latest-x86_64"

  publish_arm_docker:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish ARM container image to Docker Hub
        env:
          REPOSITORY: ${{ env.DOCKERHUB_REGISTRY }}
          TAG_SUFFIX: -aarch64
        run: ./deploy_docker_image.sh "latest-aarch64"

  publish_docker_manifest:
    runs-on: ubuntu-24.04
    needs: [publish_x86_docker, publish_arm_docker]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish Docker Hub manifest
        env:
          REPOSITORY: ${{ env.DOCKERHUB_REGISTRY }}
          ADDL_TAGS: latest
        run: ./deploy_docker_manifest.sh "${ADDL_TAGS}"

